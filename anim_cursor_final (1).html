<script>
(function () {
  var c = document.getElementById('fish-cursor');
  var hw = 15, hh = 10.2, shown = false, started = false;
  var tx = -200, ty = -200, cx = -200, cy = -200, vx = 0, vy = 0;
  var STIFF = 170, DAMP = 24, last = performance.now();
  function frame(now) {
    var dt = (now - last) / 1000; if (dt > 0.05) dt = 0.05; last = now;
    vx += ((tx - cx) * STIFF - vx * DAMP) * dt;
    vy += ((ty - cy) * STIFF - vy * DAMP) * dt;
    cx += vx * dt; cy += vy * dt;
    c.style.transform = 'translate3d(' + (cx - hw).toFixed(2) + 'px,' + (cy - hh).toFixed(2) + 'px,0)';
    window.__fishPos = { x: cx, y: cy, on: shown };
    requestAnimationFrame(frame);
  }
  window.addEventListener('mousemove', function (e) {
    tx = e.clientX; ty = e.clientY;
    if (!started) { started = true; cx = tx; cy = ty; requestAnimationFrame(frame); }
    if (!shown) { shown = true; c.style.opacity = '1'; }
  }, { passive: true });
  window.addEventListener('mouseout', function (e) {
    if (!e.relatedTarget && !e.toElement) { shown = false; c.style.opacity = '0'; }
  });
  window.addEventListener('mouseover', function () {
    if (!shown) { shown = true; c.style.opacity = '1'; }
  });
})();

var box=document.getElementById("pixie-dust"),P=[],lx=null,ly=null,MAX=420;
var G=100,LIFE=850,GAP=40;
function rnd(a,b){return a+Math.random()*(b-a);}
var BAG=[],lastD=null;
function refill(){BAG=[];D.forEach(function(d){for(var k=0;k<d.w;k++)BAG.push(d);});for(var i=BAG.length-1;i>0;i--){var j=(Math.random()*(i+1))|0,t=BAG[i];BAG[i]=BAG[j];BAG[j]=t;}}
function nextDoodle(){if(!BAG.length)refill();var d=BAG.pop();if(d===lastD&&BAG.length){var e=BAG.pop();BAG.push(d);d=e;}lastD=d;return d;}
function push(el,x,y,w,h,sq){box.appendChild(el);P.push({el:el,x:x,y:y,vx:rnd(-22,22),vy:rnd(0,24),w:w,h:h,rot:rnd(0,360),spin:rnd(-70,70),born:performance.now(),sq:sq,ph:Math.random()*6.28});if(P.length>MAX){P.shift().el.remove();}}
function doodle(x,y){var d=nextDoodle(),size=rnd(d.mx*0.45,d.mx),w,h;if(d.ar>=1){w=size;h=size/d.ar;}else{h=size;w=size*d.ar;}var el=document.createElement("div");el.style.cssText="position:absolute;top:0;left:0;width:"+w.toFixed(2)+"px;height:"+h.toFixed(2)+"px;pointer-events:none;will-change:transform,opacity;background-image:url("+d.u+");background-size:100% 100%;background-repeat:no-repeat";push(el,x+rnd(-3,3),y+rnd(-3,3),w,h,false);}
function square(x,y){var s=rnd(2,4),el=document.createElement("div");el.style.cssText="position:absolute;top:0;left:0;width:"+s.toFixed(2)+"px;height:"+s.toFixed(2)+"px;pointer-events:none;will-change:transform,opacity;background:#0a0a0a";push(el,x,y,s,s,true);}
function emit(x,y){doodle(x,y);var n=1+(Math.random()*3|0);for(var i=0;i<n;i++){square(x+rnd(-16,16),y+rnd(-12,12));}}
var last=performance.now();
function tick(now){var dt=(now-last)/1000;if(dt>0.05)dt=0.05;last=now;var fp=window.__fishPos;if(fp&&fp.on){if(lx===null){lx=fp.x;ly=fp.y;}var dx=fp.x-lx,dy=fp.y-ly,dist=Math.hypot(dx,dy);while(dist>=GAP){lx+=dx/dist*GAP;ly+=dy/dist*GAP;emit(lx,ly);dx=fp.x-lx;dy=fp.y-ly;dist=Math.hypot(dx,dy);}}else{lx=null;ly=null;}for(var i=P.length-1;i>=0;i--){var p=P[i],t=(now-p.born)/LIFE;if(t>=1){p.el.remove();P.splice(i,1);continue;}p.vy+=G*dt;p.x+=p.vx*dt;p.y+=p.vy*dt;p.rot+=p.spin*dt;var op=1-t;if(p.sq)op*=0.8+0.2*Math.abs(Math.sin((now-p.born)/100+p.ph));var sc=1-0.3*t;p.el.style.opacity=op.toFixed(3);p.el.style.transform="translate3d("+(p.x-p.w/2).toFixed(2)+"px,"+(p.y-p.h/2).toFixed(2)+"px,0) rotate("+p.rot.toFixed(1)+"deg) scale("+sc.toFixed(3)+")";}requestAnimationFrame(tick);}
